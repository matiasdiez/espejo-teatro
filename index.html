<!DOCTYPE html>
<html lang="es" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inicio - Machado Teatro</title>
    
    <!-- Tailwind CSS (CDN) -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- FlyonUI CSS -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flyonui@1.3.0/dist/full.min.css">

    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <script>
        tailwind.config = {
            darkMode: ['class', '[data-theme="dark"]'],
            theme: {
                extend: {
                    colors: {
                        base: {
                            50: '#f8fafc',
                            100: '#f1f5f9',
                            200: '#e2e8f0',
                            300: '#cbd5e1',
                            400: '#94a3b8',
                            500: '#64748b',
                            600: '#475569',
                            700: '#334155',
                            800: '#1e293b',
                            900: '#0f172a',
                            950: '#020617',
                        },
                        burgundy: {
                            50: '#fbf3f4',
                            100: '#f5e3e5',
                            200: '#ebc0c5',
                            300: '#dd949d',
                            400: '#c95e6d',
                            500: '#b03348',
                            600: '#9b2439',
                            700: '#821a2c',
                            800: '#6d1827',
                            900: '#5c1724',
                            950: '#320911',
                        }
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-base-50 text-base-900 dark:bg-base-950 dark:text-base-50 min-h-screen flex flex-col overflow-x-hidden transition-colors duration-300">

    <!-- Navbar -->
    <nav class="navbar bg-base-100 dark:bg-base-900 border-b border-base-200 dark:border-base-800 shadow-sm z-50">
        <div class="navbar-start w-auto">
            <!-- Mobile Menu Dropdown -->
            <div class="relative sm:hidden group">
                <button tabindex="0" class="btn btn-ghost btn-circle">
                    <i data-lucide="menu" class="h-5 w-5"></i>
                </button>
                <ul class="menu menu-sm absolute left-0 top-full mt-2 w-52 p-2 shadow-xl bg-base-100 dark:bg-base-800 rounded-box z-[55] opacity-0 invisible group-focus-within:opacity-100 group-focus-within:visible transition-all duration-200 border border-base-200 dark:border-base-800 pointer-events-none group-focus-within:pointer-events-auto">
                    <li><a href="index.html" class="active bg-burgundy-500/10 text-burgundy-600 dark:text-burgundy-400">Inicio</a></li>
                    <li><a href="equipo.html">Equipo</a></li>
                    <li><a href="espejo.html">Espejo</a></li>
                    <li><a href="memoria.html">Detalles Técnicos</a></li>
                </ul>
            </div>
            
            <a class="btn btn-ghost text-xl tracking-tight gap-1 sm:gap-3 px-1 sm:px-2" href="index.html">
                <img src="logo.svg" alt="Machado Teatro Logo" class="h-6 sm:h-8 w-auto dark:invert">
                <div class="hidden sm:block">
                    <span class="text-burgundy-600 dark:text-burgundy-500 font-bold">Machado</span>
                    <span class="text-base-600 dark:text-base-300">Teatro</span>
                </div>
            </a>
            <div class="h-6 w-px bg-base-300 dark:bg-base-700 mx-2 hidden sm:block"></div>
            <!-- Nav Links -->
            <div class="hidden sm:flex gap-1">
                <a href="index.html" class="btn btn-sm btn-soft bg-burgundy-600 hover:bg-burgundy-700 text-white border-0 font-medium">Inicio</a>
                <a href="equipo.html" class="btn btn-sm btn-ghost font-normal">Equipo</a>
                <a href="espejo.html" class="btn btn-sm btn-ghost font-normal">Espejo</a>
                <a href="memoria.html" class="btn btn-sm btn-ghost font-normal">Detalles Técnicos</a>
            </div>
        </div>

        <div class="navbar-end w-auto ml-auto justify-end gap-2 pr-2">
            <!-- Dark Mode Toggle -->
             <label class="swap swap-rotate btn btn-sm btn-circle btn-ghost">
                <input type="checkbox" id="theme-toggle" />
                <i data-lucide="sun" class="swap-off fill-current w-4 h-4 text-burgundy-500"></i>
                <i data-lucide="moon" class="swap-on fill-current w-4 h-4 text-base-400"></i>
            </label>
        </div>
    </nav>

    <!-- Hero Content -->
    <main class="flex-1 flex flex-col items-center justify-center p-8 relative">
        <div class="absolute inset-0 pointer-events-none" style="background-image: 
            linear-gradient(to right, var(--fallback-bc, oklch(var(--bc)/0.05)) 1px, transparent 1px),
            linear-gradient(to bottom, var(--fallback-bc, oklch(var(--bc)/0.05)) 1px, transparent 1px);
            background-size: 40px 40px;">
        </div>
        
        <div class="relative z-10 max-w-3xl text-center space-y-8">
            <img src="logo.svg" class="w-48 h-auto mx-auto mb-6 dark:invert opacity-90 drop-shadow-xl" alt="Machado Teatro">
            
            <h1 class="text-5xl md:text-7xl font-black tracking-tight text-base-900 dark:text-base-50">
                Machado <span class="text-burgundy-500">Teatro</span>
            </h1>
            
            <p class="text-xl md:text-2xl text-base-600 dark:text-base-400 font-light">
                Un espacio dedicado a las artes escénicas de vanguardia, donde la imaginación y la técnica se encuentran.
            </p>
            
            <div class="pt-8 flex flex-col sm:flex-row gap-4 justify-center w-full px-4 sm:px-0">
                <a href="equipo.html" class="btn w-full sm:w-auto bg-burgundy-600 hover:bg-burgundy-700 text-white border-0 gap-2 btn-md sm:btn-lg">
                    <i data-lucide="users" class="w-5 h-5"></i> Conoce al Equipo
                </a>
                <a href="espejo.html" class="btn w-full sm:w-auto btn-outline btn-base gap-2 btn-md sm:btn-lg">
                    <i data-lucide="layers" class="w-5 h-5"></i> Ver Planos Técnicos
                </a>
            </div>
        </div>
    </main>

    <!-- Scripts compartidos para Theme e Íconos -->
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            lucide.createIcons();

            const themeToggle = document.getElementById('theme-toggle');
            const htmlTag = document.documentElement;

            const savedTheme = localStorage.getItem('theme');
            if (savedTheme) {
                htmlTag.setAttribute('data-theme', savedTheme);
                if(themeToggle) themeToggle.checked = savedTheme === 'dark';
            } else {
                const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
                htmlTag.setAttribute('data-theme', prefersDark ? 'dark' : 'light');
                if(themeToggle) themeToggle.checked = prefersDark;
            }

            if(themeToggle) {
                themeToggle.addEventListener('change', (e) => {
                    const newTheme = e.target.checked ? 'dark' : 'light';
                    htmlTag.setAttribute('data-theme', newTheme);
                    localStorage.setItem('theme', newTheme);
                });
            }
        });
    </script>
</body>
</html>
